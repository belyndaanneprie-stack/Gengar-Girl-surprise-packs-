
<!DOCTYPE html>
<html>
<head>
  <title>Gengar Girl Packs Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #030006;
      color: white;
      text-align: center;
    }

    header {
      min-height: 310px;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.05), #050008 95%),
        url("gengar-banner.jpg") center/cover no-repeat;
      display: flex;
      align-items: end;
      justify-content: center;
      padding-bottom: 20px;
    }

    .logo {
      font-size: 58px;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      text-shadow:
        0 0 8px #ff2bd6,
        0 0 18px #ff2bd6,
        4px 4px 0 #6b21a8;
      letter-spacing: 2px;
    }

    .logo span {
      color: #a855f7;
      display: block;
      font-size: 54px;
    }

    .main {
      width: 94%;
      max-width: 1200px;
      margin: -10px auto 30px;
      background: rgba(22, 0, 35, 0.92);
      border: 1px solid #6b21a8;
      border-radius: 18px;
      box-shadow: 0 0 25px #4c1d95;
      padding: 18px;
    }

    .top-row {
      display: grid;
      grid-template-columns: 1fr 1fr 260px;
      gap: 15px;
      align-items: center;
    }

    button {
      padding: 14px 18px;
      border: 1px solid #7e22ce;
      border-radius: 10px;
      background: #12001f;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
      box-shadow: 0 0 12px rgba(168,85,247,0.4);
    }

    button:hover {
      background: #9333ea;
    }

    .primary {
      background: linear-gradient(90deg, #9333ea, #ec4899);
    }

    input, select {
      padding: 14px;
      border-radius: 9px;
      border: 1px solid #4c1d95;
      background: #0b0015;
      color: white;
      margin: 6px;
      min-width: 210px;
    }

    input::placeholder {
      color: #aaa;
    }

    .mode-text {
      font-size: 18px;
      font-weight: bold;
    }

    .pink {
      color: #ff4fd8;
    }

    .progress-box {
      border: 1px solid #6b21a8;
      border-radius: 12px;
      padding: 12px;
      text-align: left;
      background: rgba(0,0,0,0.25);
    }

    .progress {
      height: 12px;
      background: #16001f;
      border: 1px solid #6b21a8;
      border-radius: 20px;
      overflow: hidden;
      margin-top: 8px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff4fd8, #a855f7);
    }

    .admin-box, .filters {
      margin-top: 16px;
      padding: 16px;
      border: 1px solid #4c1d95;
      border-radius: 12px;
      background: rgba(18,0,31,0.75);
    }

    .admin-title {
      color: #ff4fd8;
      font-weight: bold;
      text-align: left;
      margin-bottom: 10px;
    }

    .admin-only {
      display: none;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .cards {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      min-height: 360px;
      border: 1px dashed #6b21a8;
      border-radius: 14px;
      padding: 22px;
    }

    .empty {
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 330px;
      color: #ddd;
    }

    .empty-icon {
      font-size: 70px;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 12px #a855f7);
    }

    .card {
      width: 210px;
      background: #12001f;
      border: 1px solid #4c1d95;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 0 15px rgba(168,85,247,0.25);
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: contain;
      background: white;
      border-radius: 10px;
    }

    .found {
      opacity: 0.6;
      border-color: #ffd700;
    }

    .badge {
      display: inline-block;
      padding: 6px 9px;
      margin: 3px;
      border-radius: 8px;
      font-size: 12px;
      background: #6b21a8;
    }

    .rarity {
      background: #db2777;
    }

    .found-label {
      color: #ffd700;
      font-weight: bold;
    }

    footer {
      color: #a855f7;
      font-weight: bold;
      margin: 20px;
    }

    #celebration {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      z-index: 999;
      font-size: 55px;
      pointer-events: none;
    }

    @media(max-width: 800px) {
      .top-row {
        grid-template-columns: 1fr;
      }

      .logo {
        font-size: 38px;
      }

      .logo span {
        font-size: 36px;
      }

      header {
        min-height: 220px;
      }

      input, select, button {
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    Gengar Girl
    <span>Packs</span>
  </div>
</header>

<div class="main">

  <div class="top-row">
    <div>
      <button class="primary" onclick="setPublicMode()">👁 Public View</button>
      <button onclick="showAdminLogin()">🔒 Admin Login</button>

      <div id="adminLogin" style="display:none;">
        <input type="password" id="adminPassword" placeholder="Admin password">
        <button onclick="loginAdmin()">Unlock</button>
      </div>
    </div>

    <div class="mode-text">
      Current mode: <span class="pink" id="modeName">Public View</span>
    </div>

    <div class="progress-box">
      <strong>Found</strong>
      <div id="progressText">0 of 0 Cards</div>
      <strong>Progress</strong>
      <div id="percentText">0%</div>
      <div class="progress">
        <div class="bar" id="progressBar"></div>
      </div>
    </div>
  </div>

  <div class="admin-box admin-only">
    <div class="admin-title">✦ Add New Card (Admin Only)</div>

    <input id="newName" placeholder="Card name">

    <select id="newSection">
      <option>English</option>
      <option>Japanese</option>
      <option>Chinese</option>
      <option>Mix</option>
    </select>

    <select id="newRarity">
      <option>Common</option>
      <option>Rare</option>
      <option>Ultra Rare</option>
      <option>Secret Rare</option>
    </select>

    <input type="file" id="cardImage" accept="image/*">

    <button class="primary" onclick="addCard()">＋ Add Card</button>
  </div>

  <div class="filters">
    <input id="searchBox" placeholder="🔍 Search cards..." onkeyup="renderCards()">

    <select id="sectionFilter" onchange="renderCards()">
      <option>All Sections</option>
      <option>English</option>
      <option>Japanese</option>
      <option>Chinese</option>
      <option>Mix</option>
    </select>

    <select id="rarityFilter" onchange="renderCards()">
      <option>All Rarities</option>
      <option>Common</option>
      <option>Rare</option>
      <option>Ultra Rare</option>
      <option>Secret Rare</option>
    </select>

    <button onclick="clearFilters()">↻ Clear Filters</button>
  </div>

  <div class="cards" id="cardList"></div>

</div>

<footer>
  Gengar Girl Packs Tracker • Happy Pulls! 👻 ✨
</footer>

<div id="celebration">🎆✨ FOUND! ✨🎆</div>

<script>
let adminMode = false;
let cards = JSON.parse(localStorage.getItem("gengarCardsV3")) || [];

function saveCards() {
  localStorage.setItem("gengarCardsV3", JSON.stringify(cards));
}

function setPublicMode() {
  adminMode = false;
  document.getElementById("modeName").innerText = "Public View";
  document.getElementById("adminLogin").style.display = "none";

  document.querySelectorAll(".admin-only").forEach(function(el) {
    el.style.display = "none";
  });

  renderCards();
}

function showAdminLogin() {
  document.getElementById("adminLogin").style.display = "block";
}

function loginAdmin() {
  const password = document.getElementById("adminPassword").value;

  if (password === "gengar123") {
    adminMode = true;
    document.getElementById("modeName").innerText = "Admin View";
    document.getElementById("adminLogin").style.display = "none";

    document.querySelectorAll(".admin-only").forEach(function(el) {
      el.style.display = "block";
    });

    renderCards();
  } else {
    alert("Wrong password");
  }
}

function addCard() {
  const name = document.getElementById("newName").value.trim();
  const section = document.getElementById("newSection").value;
  const rarity = document.getElementById("newRarity").value;
  const imageFile = document.getElementById("cardImage").files[0];

  if (!name || !imageFile) {
    alert("Please add a card name and choose an image");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(event) {
    cards.push({
      name: name,
      section: section,
      rarity: rarity,
      image: event.target.result,
      found: false
    });

    saveCards();

    document.getElementById("newName").value = "";
    document.getElementById("cardImage").value = "";

    renderCards();
  };

  reader.readAsDataURL(imageFile);
}

function toggleFound(index) {
  cards[index].found = !cards[index].found;
  saveCards();

  if (cards[index].found) {
    celebrate();
  }

  renderCards();
}

function deleteCard(index) {
  if (confirm("Delete this card?")) {
    cards.splice(index, 1);
    saveCards();
    renderCards();
  }
}

function clearFilters() {
  document.getElementById("searchBox").value = "";
  document.getElementById("sectionFilter").value = "All Sections";
  document.getElementById("rarityFilter").value = "All Rarities";
  renderCards();
}

function celebrate() {
  const celebration = document.getElementById("celebration");
  celebration.style.display = "flex";

  setTimeout(function() {
    celebration.style.display = "none";
  }, 1200);
}

function updateProgress() {
  const found = cards.filter(card => card.found).length;
  const total = cards.length;
  const percent = total === 0 ? 0 : Math.round((found / total) * 100);

  document.getElementById("progressText").innerText = found + " of " + total + " Cards";
  document.getElementById("percentText").innerText = percent + "%";
  document.getElementById("progressBar").style.width = percent + "%";
}

function renderCards() {
  const search = document.getElementById("searchBox").value.toLowerCase();
  const sectionFilter = document.getElementById("sectionFilter").value;
  const rarityFilter = document.getElementById("rarityFilter").value;

  const list = document.getElementById("cardList");
  list.innerHTML = "";

  const filteredCards = cards.filter(function(card) {
    if (!card.name.toLowerCase().includes(search)) return false;
    if (sectionFilter !== "All Sections" && card.section !== sectionFilter) return false;
    if (rarityFilter !== "All Rarities" && card.rarity !== rarityFilter) return false;
    return true;
  });

  if (cards.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">👻</div>
        <h1>No cards added yet!</h1>
        <p>Login as admin to add your first card.</p>
        <p>Once added, they will appear here.</p>
        <button class="primary" onclick="showAdminLogin()">🔒 Admin Login</button>
      </div>
    `;
    updateProgress();
    return;
  }

  if (filteredCards.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <h1>No cards found</h1>
        <p>Try clearing your filters.</p>
      </div>
    `;
    updateProgress();
    return;
  }

  filteredCards.forEach(function(card) {
    const realIndex = cards.indexOf(card);

    const div = document.createElement("div");
    div.className = "card" + (card.found ? " found" : "");

    div.innerHTML = `
      <img src="${card.image}" alt="${card.name}">
      <h3>${card.name}</h3>

      <span class="badge">${card.section}</span>
      <span class="badge rarity">${card.rarity}</span>

      <p class="found-label">${card.found ? "FOUND" : "Not found yet"}</p>

      ${
        adminMode
        ? `
          <button class="primary" onclick="toggleFound(${realIndex})">
            ${card.found ? "Mark Not Found" : "Mark Found"}
          </button>
          <button onclick="deleteCard(${realIndex})">Delete</button>
        `
        : ""
      }
    `;

    list.appendChild(div);
  });

  updateProgress();
}

renderCards();
</script>

</body>
</html>
