<!DOCTYPE html>
<html>
<head>
<title>Gengar Girl Surprise Packs</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#100018;color:white;font-family:Arial;margin:0;text-align:center}
header{background:#250038;padding:25px;box-shadow:0 0 20px #a855f7}
.shop{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;padding:25px}
.card{background:#220033;width:260px;padding:15px;border-radius:18px;box-shadow:0 0 15px #7d2cff}
.card img{width:100%;border-radius:12px}
.price{font-size:22px;font-weight:bold;color:#ffd700}
.available{color:#00ff88;font-weight:bold}
.sold{color:#ff4d4d;font-weight:bold}
.collected{color:#4db8ff;font-weight:bold}
</style>
</head>
<body>

<header>
<h1>👻 Gengar Girl Surprise Packs 👻</h1>
<p>Pokémon cards, surprise packs & spooky pulls</p>
</header>

<div id="shop" class="shop">Loading products...</div>

<script>
const SUPABASE_URL = "https://ucmzynvmubuinhnjhlsw.supabase.co";
const SUPABASE_KEY = "sb_publishable_jx8zuchbde4-j0DCDo6JXA_X1KyzkGv";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadProducts() {
  const shop = document.getElementById("shop");

  const { data, error } = await db
    .from("products")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    shop.innerHTML = "Could not load products.";
    console.log(error);
    return;
  }

  shop.innerHTML = "";

  data.forEach(product => {
    const statusClass = (product.status || "available").toLowerCase();

    shop.innerHTML += `
      <div class="card">
        <img src="${product.image_url}">
        <h2>${product.name}</h2>
        <p>Condition: ${product.condition}</p>
        <p class="price">£${product.price}</p>
        <p class="${statusClass}">${product.status}</p>
      </div>
    `;
  });
}

loadProducts();
</script>

</body>
</html>
