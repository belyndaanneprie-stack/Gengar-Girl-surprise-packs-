 <!DOCTYPE html>
<html>
<head>
  <title>Gengar Girl Packs Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #3b005c, #08000d);
      color: white;
      text-align: center;
    }

    header {
      padding: 25px;
      background: #16001f;
      box-shadow: 0 0 25px #a855f7;
    }

    .logo {
      font-size: 42px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 10px #d946ef, 0 0 25px #9333ea;
    }

    .logo span {
      color: #ffd700;
    }

    .tagline {
      color: #d8b4fe;
      margin-top: 5px;
    }

    .mode-box {
      margin: 20px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 12px;
      background: #9333ea;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
      box-shadow: 0 0 10px #a855f7;
    }

    button:hover {
      background: #a855f7;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin: 8px;
      width: 250px;
      max-width: 80%;
    }

    .progress-box {
      background: #2a003f;
      margin: 15px auto;
      padding: 15px;
      border-radius: 15px;
      width: 85%;
      max-width: 500px;
      box-shadow: 0 0 15px #7e22ce;
    }

    .progress {
      background: #111;
      border-radius: 20px;
      overflow: hidden;
      height: 18px;
      margin-top: 10px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffd700, #ff4dff);
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #250035;
      width: 180px;
      padding: 12px;
      border-radius: 15px;
      box-shadow: 0 0 12px #7e22ce;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      background: white;
    }

    .found {
      opacity: 0.6;
      border: 2px solid #ffd700;
    }

    .found-label {
      color: #ffd700;
      font-weight: bold;
    }

    .admin-only {
      display: none;
    }

    #celebration {
      position: fixed;
      inset: 0;
      pointer-events: none;
      font-size: 40px;
      display: none;
      align-items: center;
      justify-content: center;
      animation: pop 1s ease;
      z-index: 999;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">👻 Gengar Girl <span>Packs</span> ✨</div>
  <div class="tagline">Live Pokémon Pack Tracker</div>
</header>

<div class="mode-box">
  <button onclick="setPublicMode()">Public View</button>
  <button onclick="showAdminLogin()">Admin Login</button>

  <div id="adminLogin" style="display:none;">
    <input type="password" id="adminPassword" placeholder="Enter admin password">
    <button onclick="loginAdmin()">Unlock Admin</button>
  </div>

  <p id="modeText">Current mode: Public View</p>
</div>

<div class="progress-box">
  <div id="progressText">Found 0 of 0 cards</div>
  <div class="progress">
    <div class="bar" id="progressBar"></div>
  </div>
</div>

<input type="text" id="searchBox" placeholder="Search Pokémon card..." onkeyup="renderCards()">

<div class="cards" id="cardList"></div>

<div id="celebration">🎆✨ FOUND! ✨🎆</div>

<script>
  let adminMode = false;

  let cards = JSON.parse(localStorage.getItem("gengarCards")) || [
    {
      name: "Gengar",
      image: "https://images.pokemontcg.io/swsh8/157_hires.png",
      found: false
    },
    {
      name: "Pikachu",
      image: "https://images.pokemontcg.io/swsh4/43_hires.png",
      found: false
    },
    {
      name: "Charizard",
      image: "https://images.pokemontcg.io/swsh35/20_hires.png",
      found: false
    },
    {
      name: "Eevee",
      image: "https://images.pokemontcg.io/swsh4/130_hires.png",
      found: false
    }
  ];

  function saveCards() {
    localStorage.setItem("gengarCards", JSON.stringify(cards));
  }

  function setPublicMode() {
    adminMode = false;
    document.getElementById("modeText").innerText = "Current mode: Public View";
    document.getElementById("adminLogin").style.display = "none";
    renderCards();
  }

  function showAdminLogin() {
    document.getElementById("adminLogin").style.display = "block";
  }

  function loginAdmin() {
    const password = document.getElementById("adminPassword").value;

    if (password === "gengar123") {
      adminMode = true;
      document.getElementById("modeText").innerText = "Current mode: Admin View";
      document.getElementById("adminLogin").style.display = "none";
      renderCards();
    } else {
      alert("Wrong password");
    }
  }

  function toggleFound(index) {
    cards[index].found = !cards[index].found;
    saveCards();

    if (cards[index].found) {
      celebrate();
    }

    renderCards();
  }

  function celebrate() {
    const celebration = document.getElementById("celebration");
    celebration.style.display = "flex";

    setTimeout(() => {
      celebration.style.display = "none";
    }, 1000);
  }

  function updateProgress() {
    const found = cards.filter(card => card.found).length;
    const total = cards.length;
    const percent = total === 0 ? 0 : (found / total) * 100;

    document.getElementById("progressText").innerText = `Found ${found} of ${total} cards`;
    document.getElementById("progressBar").style.width = percent + "%";
  }

  function renderCards() {
    const search = document.getElementById("searchBox").value.toLowerCase();
    const list = document.getElementById("cardList");
    list.innerHTML = "";

    cards.forEach((card, index) => {
      if (!card.name.toLowerCase().includes(search)) return;

      const div = document.createElement("div");
      div.className = "card" + (card.found ? " found" : "");

      div.innerHTML = `
        <img src="${card.image}" alt="${card.name}">
        <h3>${card.name}</h3>
        <p class="found-label">${card.found ? "FOUND" : "Not found yet"}</p>
        ${
          adminMode
          ? `<button onclick="toggleFound(${index})">${card.found ? "Mark Not Found" : "Mark Found"}</button>`
          : ""
        }
      `;

      list.appendChild(div);
    });

    updateProgress();
  }

  renderCards();
</script>

</body>
</html>
