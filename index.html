
<!DOCTYPE html>
<html>
<head>
<title>Gengar Girl Card Finder</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#100018;
  color:white;
  overflow:hidden;
}
header{
  background:#250038;
  padding:15px;
  text-align:center;
  box-shadow:0 0 20px #a855f7;
}
.layout{
  display:flex;
  height:calc(100vh - 80px);
}
.sidebar{
  width:280px;
  background:#1b0029;
  padding:15px;
  overflow-y:auto;
  box-shadow:0 0 20px #7d2cff;
}
input{
  width:95%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:15px;
}
.card-item{
  display:flex;
  align-items:center;
  gap:10px;
  background:#2b0040;
  margin-bottom:10px;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
}
.card-item img{
  width:45px;
  border-radius:6px;
}
.main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  text-align:center;
}
.big-card{
  background:#220033;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 30px #a855f7;
  cursor:pointer;
  z-index:2;
}
.big-card img{
  width:320px;
  max-height:480px;
  object-fit:contain;
  border-radius:15px;
}
.found{
  font-size:70px;
  color:#ffd700;
  text-shadow:0 0 20px #ff00ff;
  animation:pulse 0.8s infinite alternate;
}
@keyframes pulse{
  from{transform:scale(1)}
  to{transform:scale(1.15)}
}
.firework{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  animation:explode 1s linear forwards;
}
@keyframes explode{
  from{transform:scale(1);opacity:1}
  to{transform:scale(25);opacity:0}
}
</style>
</head>
<body>

<header>
<h1>👻 Gengar Girl Card Finder 👻</h1>
</header>

<div class="layout">
  <div class="sidebar">
    <input id="search" placeholder="Search for a card..." onkeyup="searchCards()">
    <div id="cardList"></div>
  </div>

  <div class="main" id="main">
    <div id="display">
      <h2>Search or click a card</h2>
      <p>The selected card will appear here</p>
    </div>
  </div>
</div>

<script>
let cards = [
  {
    name:"Charizard",
    image:"https://images.pokemontcg.io/base1/4.png"
  },
  {
    name:"Pikachu",
    image:"https://images.pokemontcg.io/swsh4/25.png"
  },
  {
    name:"Gengar",
    image:"https://images.pokemontcg.io/swsh11/66.png"
  },
  {
    name:"Eevee",
    image:"https://images.pokemontcg.io/swsh4/130.png"
  }
];

function loadList(list = cards){
  const cardList = document.getElementById("cardList");
  cardList.innerHTML = "";

  list.forEach(card=>{
    cardList.innerHTML += `
      <div class="card-item" onclick="showCard('${card.name}', '${card.image}')">
        <img src="${card.image}">
        <span>${card.name}</span>
      </div>
    `;
  });
}

function searchCards(){
  const text = document.getElementById("search").value.toLowerCase();
  const filtered = cards.filter(card => card.name.toLowerCase().includes(text));
  loadList(filtered);
}

function showCard(name, image){
  document.getElementById("display").innerHTML = `
    <div class="big-card" onclick="markFound('${name}')">
      <img src="${image}">
      <h2>${name}</h2>
      <p>Click card when found</p>
    </div>
  `;
}

function markFound(name){
  fireworks();
  document.getElementById("display").innerHTML = `
    <div>
      <div class="found">FOUND!</div>
      <h1>${name}</h1>
    </div>
  `;
}

function fireworks(){
  const main = document.getElementById("main");

  for(let i=0;i<30;i++){
    const firework = document.createElement("div");
    firework.className = "firework";
    firework.style.left = Math.random() * 100 + "%";
    firework.style.top = Math.random() * 100 + "%";
    firework.style.background = ["#ff00ff","#ffd700","#00ffff","#ff4d4d","#00ff88"][Math.floor(Math.random()*5)];
    main.appendChild(firework);

    setTimeout(()=>firework.remove(),1000);
  }
}

loadList();
</script>

</body>
</html>
